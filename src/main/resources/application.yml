micronaut:
  application:
    name: sistema-aluguel

datasources:
  default:
    url: jdbc:sqlite:clientes.db
    driverClassName: org.sqlite.JDBC
    schema-generate: CREATE_DROP

jpa:
  default:
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect

views:
  thymeleaf:
    enabled: true

server:
  port: 8080
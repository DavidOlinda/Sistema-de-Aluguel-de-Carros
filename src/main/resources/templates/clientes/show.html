<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Cliente</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        dl { max-width: 700px; }
        dt { font-weight: bold; margin-top: 10px; }
        dd { margin-left: 0; margin-bottom: 10px; }
        table { border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; }
        button { display: inline-block; margin-top: 16px; padding: 8px 12px; background: #6c757d; color: white; border: none; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>
<h1>Cliente</h1>
<dl>
    <dt>Nome</dt>
    <dd th:text="${cliente.nome}"></dd>
    <dt>CPF</dt>
    <dd th:text="${cliente.cpf}"></dd>
    <dt>RG</dt>
    <dd th:text="${cliente.rg}"></dd>
    <dt>Endereço</dt>
    <dd th:text="${cliente.endereco}"></dd>
    <dt>Profissão</dt>
    <dd th:text="${cliente.profissao}"></dd>
</dl>

<h3>Rendimentos</h3>
<p th:if="${#lists.isEmpty(cliente.rendimentos)}">Nenhum rendimento cadastrado.</p>
<table th:if="${!#lists.isEmpty(cliente.rendimentos)}">
    <thead>
        <tr><th>Fonte</th><th>Valor</th></tr>
    </thead>
    <tbody>
        <tr th:each="r : ${cliente.rendimentos}">
            <td th:text="${r.fonte}"></td>
            <td th:text="${r.valor}"></td>
        </tr>
    </tbody>
</table>

<button onclick="window.location='/clientes/'">Voltar</button>
</body>
</html>

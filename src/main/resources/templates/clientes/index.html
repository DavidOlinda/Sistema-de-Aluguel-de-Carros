<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Clientes</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background: #f2f2f2; }
        button.action { display: inline-block; margin-right: 10px; padding: 8px 12px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: inherit; }
        button.delete { background: #dc3545; }
        form.inline { display: inline-block; margin: 0
    </style>
</head>
<body>
<h1>Cadastro de Clientes</h1>

<form action="/clientes" method="get">
    <label>Buscar por nome:</label>
    <input type="text" name="busca" th:value="${busca}" />
    <button type="submit">Pesquisar</button>
    <button type="button" class="action" onclick="window.location='/clientes/create'">Novo cliente</button>
</form>

<table>
    <thead>
        <tr>
            <th>Nome</th>
            <th>CPF</th>
            <th>RG</th>
            <th>Profissão</th>
            <th>Endereço</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody>
        <th:block th:each="cliente : ${clientes}">
            <tr>
                <td th:text="${cliente.nome}">Nome</td>
                <td th:text="${cliente.cpf}">CPF</td>
                <td th:text="${cliente.rg}">RG</td>
                <td th:text="${cliente.profissao}">Profissão</td>
                <td th:text="${cliente.endereco}">Endereço</td>
                <td>
                    <button class="action" th:onclick="'window.location=\'/clientes/' + ${cliente.id} + '\''">Ver</button>
                    <button class="action" th:onclick="'window.location=\'/clientes/' + ${cliente.id} + '/edit\''">Editar</button>
                    <button class="action delete" th:onclick="'excluir(' + ${cliente.id} + ')'">Excluir</button>
                </td>
            </tr>
        </th:block>
    </tbody>
</table>
<script>
    function excluir(id) {
        if (!confirm('Remover cliente?')) return;
        fetch('/clientes/' + id, { method: 'DELETE' })
            .then(() => window.location.reload());
    }
</script>
</body>
</html>
